<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table 태그</title>
</head>
<body>
    <!-- 표를 만드는 태그 : table, tr, th, td, caption colgroup, col 
        th태그: 가운데 정렬, 글자 진하게 표시하여 강조한다. 

        colgroup : 컬럼단위 기능을 적용할 수 있다.(한번에 넣을 때 사용한다.)
        col: 칸을 의미한다.

        caption태그: 표의 제목을 표시한다. (자동으로 센터로 이동, 밑에다가 둔다고 해서 밑으로 가지는 않는다.)

        ctrl + shift + L => 여러 곳을 한번에 설정할 때 사용
    -->
     <table border="1" width="500"><!--border는 표를 만들어 줌 width를 통해서 픽셀도 조절 가능-->
        <caption><h2>시간표</h2></caption>
        <colgroup>
            <col/>
            <col style="background:aquamarine;"/>
            <col/>
        </colgroup>
        <thead>
        <tr><!--첫번째 줄-->
            <th>용도</th>
            <th>중량</th>
            <th>가격</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>첫번째칸</td>
            <td width="200"><img src="../img/2.jpeg" width="100"/></td>
            <td style = "color:blue">세번째 칸 세번째 칸 세번째 칸 세번째 칸 세번째 칸</td>
        </tr>
        <tr style="color:red">
            <td>AA<b>AA</b>A</td>
            <td>
                <ol>
                    <li>html연습중</li>
                    <li>css앞으로 할것</li>
                </ol>
            </td>
            <td><img src="../img/5.jpeg" width="100"/></td>
        </tr>
        </tbody>
     </table>
</body>
</html>
