<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이미지 태그</title>
</head>
<body>
    <pre>
        상대주소지정방식   / 절대주소지정방식
        ./ : 현재위치 
        ../ : 상위폴더 
        pre는 줄 바꿈 자동
        현재위치(생략해도 됨) 상위폴더 img파일 들어가기 6번 이미지
        퍼센트 50을 가로 기준으로 하면 50%들어가고 세로는 알아서 맞춰짐
        body이미지가 줄어들면 같이 줄어들음
    </pre>
    <img src="./../img/7.jpeg" alt="눈꽃" width="200" height="400"/><br/>
    <img src="../img/3.jpeg"/ width="50%" height="50%"/>
</body>
</html>
